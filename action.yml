name: 'Harden Build Attestation'
description: 'Attest a CI/CD build with Harden using OIDC — makes leaked credentials provably insufficient'
author: 'HardenLabs'
branding:
  icon: 'shield'
  color: 'blue'
inputs:
  client-id:
    description: 'Harden OAuth client ID'
    required: true
  client-secret:
    description: 'Harden OAuth client secret'
    required: true
  service-id:
    description: 'Harden service ID (svc_xxxx)'
    required: true
  api-endpoint:
    description: 'Harden API endpoint'
    required: false
    default: 'https://api.hardenapi.com'
  token-endpoint:
    description: 'Override OAuth token endpoint (e.g., direct Cognito URL)'
    required: false
  commit-sha:
    description: 'Override commit SHA (defaults to current commit)'
    required: false
  max-retries:
    description: 'Max retry attempts for attestation API call'
    required: false
    default: '3'
  inject:
    description: 'Auto-inject build key into SDK source files (true/false). Searches for %%HARDEN_BUILD_KEY%% placeholders.'
    required: false
    default: 'true'
  search-path:
    description: 'Directory to search for SDK placeholder files (default: current directory)'
    required: false
    default: '.'
outputs:
  build-key:
    description: 'The build attestation key (also injected into SDK if inject=true)'
  commit-sha:
    description: 'The commit SHA used for attestation'
  injected-files:
    description: 'Number of files where placeholders were replaced'
runs:
  using: 'node20'
  main: 'dist/index.js'
